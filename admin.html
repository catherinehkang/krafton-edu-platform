<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | KRAFTON Ways of Working</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="back-link">← 메인으로</a>
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 26 26" fill="none"><rect width="26" height="26" rx="7" fill="#C8102E"/><path d="M7 13h12M13 7v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
          <span>관리자</span>
        </div>
        <button id="logout-btn" class="admin-link" style="display:none">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- Auth Gate -->
  <div id="admin-gate" class="gate-overlay">
    <div class="gate-card">
      <div class="gate-logo">
        <svg width="20" height="20" viewBox="0 0 26 26" fill="none"><rect width="26" height="26" rx="7" fill="#C8102E"/><path d="M7 13h12M13 7v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
        <span>KRAFTON Ways of Working</span>
      </div>
      <h2>관리자 인증</h2>
      <p class="muted" style="margin-bottom:16px">관리자 비밀번호를 입력하세요</p>
      <input type="password" id="admin-pw-input" class="form-input" placeholder="관리자 비밀번호" />
      <p id="admin-pw-error" class="error-text hidden">비밀번호가 올바르지 않습니다.</p>
      <button id="admin-pw-submit" class="btn btn-primary full-width" style="margin-top:12px">확인</button>
    </div>
  </div>

  <main class="container main-content" id="admin-main" style="display:none">

    <div class="admin-stats">
      <div class="stat-card"><span class="stat-num" id="stat-sessions">-</span><span class="stat-label">전체 차수</span></div>
      <div class="stat-card"><span class="stat-num" id="stat-questions">-</span><span class="stat-label">질문 수</span></div>
      <div class="stat-card"><span class="stat-num" id="stat-answers">-</span><span class="stat-label">전체 답변</span></div>
    </div>

    <!-- Add Session -->
    <div class="card admin-section">
      <h2 class="card-title">새 교육 차수 추가</h2>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">차수 번호</label>
          <input type="number" id="new-order" class="form-input" placeholder="예: 1" min="1" />
        </div>
        <div class="form-group">
          <label class="form-label">교육명</label>
          <input type="text" id="new-title" class="form-input" placeholder="예: WoW 전사 교육 1차" />
        </div>
        <div class="form-group">
          <label class="form-label">날짜 및 시간</label>
          <input type="datetime-local" id="new-date" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label">참여 비밀번호</label>
          <input type="text" id="new-password" class="form-input" placeholder="참여자에게 공유할 비밀번호" />
        </div>
        <div class="form-group full-col">
          <label class="form-label">설명 (선택)</label>
          <input type="text" id="new-desc" class="form-input" placeholder="간단한 설명" />
        </div>
      </div>
      <button id="add-session-btn" class="btn btn-primary">차수 추가</button>
    </div>

    <div class="section-header"><h3>차수 목록</h3></div>
    <div id="admin-session-list">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- Question Modal -->
  <div id="question-modal" class="modal-backdrop hidden">
    <div class="modal modal-wide">
      <button class="modal-close" id="question-modal-close">✕</button>
      <div class="modal-header">
        <h2>질문 관리</h2>
        <p id="question-modal-session" class="muted"></p>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:4px">
          <label class="form-label">질문 내용</label>
          <textarea id="question-text" class="form-textarea" placeholder="예: Ways of Working 중 우리 팀에서 가장 잘 실천하고 있는 Way는 무엇인가요? 그 이유는?" rows="3"></textarea>
          <button id="add-question-btn" class="btn btn-primary" style="align-self:flex-end">질문 추가</button>
        </div>

        <div class="section-header" style="margin-top:20px">
          <h3>등록된 질문 <span id="question-count" class="count-badge">0</span></h3>
        </div>
        <div id="question-list"></div>
      </div>
    </div>
  </div>

  <!-- Presentation Modal -->
  <div id="present-modal" class="modal-backdrop hidden">
    <div class="modal modal-wide" style="max-width:900px">
      <button class="modal-close" id="present-modal-close">✕</button>
      <div id="present-content"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc, deleteDoc,
      query, orderBy, serverTimestamp, getDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "./firebase-config.js";

    const ADMIN_PASSWORD = "admin1234"; // ← 변경하세요

    const WAYS = [
      { num: 1, label: "도전은 담대하게, 시작은 작고 빠르게" },
      { num: 2, label: "일의 방향이 다르면 달려도 제자리" },
      { num: 3, label: "모든 일에는 한 명의 책임자" },
      { num: 4, label: "충돌은 더 나은 결과를 만드는 기회" },
      { num: 5, label: "문화는 수평적으로, 업무는 수직적으로" },
      { num: 6, label: "로컬의 감각으로 글로벌 최적화" },
      { num: 7, label: "AI는 모든 업무의 최우선 파트너" },
      { num: 8, label: "자율은 스스로 원칙을 지키는 자세" },
      { num: 9, label: "주도하거나, 따르거나, 떠나거나" },
    ];

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    let activeSessionId = null;

    // Auth
    const gate = document.getElementById("admin-gate");
    const main = document.getElementById("admin-main");

    if (sessionStorage.getItem("edu_admin") === "true") {
      gate.style.display = "none"; main.style.display = "block";
      document.getElementById("logout-btn").style.display = "block";
      loadAdminData();
    }

    document.getElementById("admin-pw-submit").addEventListener("click", () => {
      if (document.getElementById("admin-pw-input").value === ADMIN_PASSWORD) {
        sessionStorage.setItem("edu_admin", "true");
        gate.style.display = "none"; main.style.display = "block";
        document.getElementById("logout-btn").style.display = "block";
        loadAdminData();
      } else {
        document.getElementById("admin-pw-error").classList.remove("hidden");
      }
    });
    document.getElementById("admin-pw-input").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("admin-pw-submit").click(); });
    document.getElementById("logout-btn").addEventListener("click", () => { sessionStorage.removeItem("edu_admin"); location.reload(); });

    async function loadAdminData() {
      const q = query(collection(db, "sessions"), orderBy("order", "asc"));
      const snap = await getDocs(q);
      const sessions = [];
      snap.forEach(d => sessions.push({ id: d.id, ...d.data() }));
      document.getElementById("stat-sessions").textContent = sessions.length;

      const list = document.getElementById("admin-session-list");
      if (!sessions.length) {
        list.innerHTML = `<div class="empty-state"><p>등록된 차수가 없습니다.</p></div>`;
        document.getElementById("stat-questions").textContent = 0;
        document.getElementById("stat-answers").textContent = 0;
        return;
      }

      let totalQ = 0, totalA = 0;
      for (const s of sessions) {
        const qSnap = await getDocs(collection(db, "sessions", s.id, "questions"));
        s._qCount = qSnap.size; totalQ += qSnap.size;
        let aCount = 0;
        for (const qDoc of qSnap.docs) {
          const aSnap = await getDocs(collection(db, "sessions", s.id, "questions", qDoc.id, "answers"));
          aCount += aSnap.size;
        }
        s._aCount = aCount; totalA += aCount;
      }
      document.getElementById("stat-questions").textContent = totalQ;
      document.getElementById("stat-answers").textContent = totalA;

      list.innerHTML = sessions.map(s => {
        const d = s.date?.toDate ? s.date.toDate() : new Date(s.date);
        return `
          <div class="admin-session-row">
            <div class="admin-session-info">
              <span class="session-badge">${s.order}차</span>
              <div>
                <strong>${esc(s.title)}</strong>
                <p class="muted sm">${d.toLocaleDateString("ko-KR")} · PW: <code>${esc(s.password)}</code> · 질문 ${s._qCount}개 · 답변 ${s._aCount}개</p>
              </div>
            </div>
            <div class="admin-session-actions">
              <button class="btn btn-sm" onclick="openQuestionModal('${s.id}','${esc(s.title)}')">질문 관리</button>
              <button class="btn btn-sm btn-black" onclick="openPresentation('${s.id}','${esc(s.title)}')">📺 발표 화면</button>
              <button class="btn btn-sm btn-danger" onclick="delSession('${s.id}')">삭제</button>
            </div>
          </div>`;
      }).join("");
    }

    // Add Session
    document.getElementById("add-session-btn").addEventListener("click", async () => {
      const order = parseInt(document.getElementById("new-order").value);
      const title = document.getElementById("new-title").value.trim();
      const dateVal = document.getElementById("new-date").value;
      const password = document.getElementById("new-password").value.trim();
      const desc = document.getElementById("new-desc").value.trim();
      if (!order || !title || !dateVal || !password) { alert("차수번호, 교육명, 날짜, 비밀번호는 필수입니다."); return; }
      const btn = document.getElementById("add-session-btn");
      btn.disabled = true; btn.textContent = "추가 중...";
      await addDoc(collection(db, "sessions"), {
        order, title, date: new Date(dateVal), password, description: desc, createdAt: serverTimestamp()
      });
      ["new-order","new-title","new-date","new-password","new-desc"].forEach(id => document.getElementById(id).value = "");
      btn.disabled = false; btn.textContent = "차수 추가";
      loadAdminData();
    });

    window.delSession = async (id) => {
      if (!confirm("이 차수와 모든 데이터를 삭제하시겠습니까?")) return;
      await deleteDoc(doc(db, "sessions", id));
      loadAdminData();
    };

    // Question Modal
    window.openQuestionModal = async (sessionId, title) => {
      activeSessionId = sessionId;
      document.getElementById("question-modal-session").textContent = title;
      document.getElementById("question-modal").classList.remove("hidden");
      loadQuestions();
    };
    document.getElementById("question-modal-close").addEventListener("click", () =>
      document.getElementById("question-modal").classList.add("hidden"));

    document.getElementById("add-question-btn").addEventListener("click", async () => {
      const text = document.getElementById("question-text").value.trim();
      if (!text) { alert("질문 내용을 입력하세요."); return; }
      const snap = await getDocs(collection(db, "sessions", activeSessionId, "questions"));
      const btn = document.getElementById("add-question-btn");
      btn.disabled = true; btn.textContent = "추가 중...";
      await addDoc(collection(db, "sessions", activeSessionId, "questions"), {
        text, order: snap.size + 1, createdAt: serverTimestamp()
      });
      document.getElementById("question-text").value = "";
      btn.disabled = false; btn.textContent = "질문 추가";
      loadQuestions();
      loadAdminData();
    });

    async function loadQuestions() {
      const q = query(collection(db, "sessions", activeSessionId, "questions"), orderBy("order", "asc"));
      const snap = await getDocs(q);
      const questions = [];
      snap.forEach(d => questions.push({ id: d.id, ...d.data() }));
      document.getElementById("question-count").textContent = questions.length;
      const list = document.getElementById("question-list");
      if (!questions.length) { list.innerHTML = `<div class="empty-state"><p>등록된 질문이 없습니다.</p></div>`; return; }
      list.innerHTML = questions.map(q => `
        <div class="question-admin-item">
          <div class="question-admin-header">
            <div>
              <span style="font-size:11px;font-weight:700;color:var(--red)">Q${q.order}</span>
              <p style="font-size:14px;font-weight:500;margin-top:4px">${esc(q.text)}</p>
            </div>
            <button class="btn btn-sm btn-danger" onclick="delQuestion('${q.id}')">삭제</button>
          </div>
        </div>`).join("");
    }

    window.delQuestion = async (id) => {
      if (!confirm("이 질문을 삭제하시겠습니까?")) return;
      await deleteDoc(doc(db, "sessions", activeSessionId, "questions", id));
      loadQuestions();
      loadAdminData();
    };

    // Presentation View
    window.openPresentation = async (sessionId, title) => {
      document.getElementById("present-modal").classList.remove("hidden");
      const content = document.getElementById("present-content");
      content.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>불러오는 중...</p></div>`;

      const qSnap = await getDocs(query(collection(db, "sessions", sessionId, "questions"), orderBy("order", "asc")));
      const questions = [];
      qSnap.forEach(d => questions.push({ id: d.id, ...d.data() }));

      if (!questions.length) {
        content.innerHTML = `<div class="empty-state"><p>등록된 질문이 없습니다.</p></div>`;
        return;
      }

      let html = `
        <div class="presentation-header">
          <div>
            <h2>${esc(title)}</h2>
            <p>조별 대표 의견 모아보기</p>
          </div>
          <button class="btn btn-sm" onclick="document.getElementById('present-modal').classList.add('hidden')" style="color:#fff;border-color:#444">닫기</button>
        </div>`;

      for (const q of questions) {
        // 각 Way의 최다 좋아요 답변 가져오기
        const aSnap = await getDocs(
          query(collection(db, "sessions", sessionId, "questions", q.id, "answers"), orderBy("likes", "desc"))
        );
        const allAnswers = [];
        aSnap.forEach(d => allAnswers.push({ id: d.id, ...d.data() }));

        // Way별 top 1 추출
        const topByWay = {};
        for (const way of WAYS) {
          const wayAnswers = allAnswers.filter(a => a.wayNum === way.num);
          if (wayAnswers.length) topByWay[way.num] = wayAnswers[0];
        }

        html += `
          <div style="margin-bottom:28px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
              <span style="background:var(--red);color:white;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px">Q${q.order}</span>
              <span style="font-size:16px;font-weight:600;color:var(--black)">${esc(q.text)}</span>
            </div>
            <div class="results-grid">
              ${WAYS.map(way => {
                const top = topByWay[way.num];
                return `
                  <div class="result-way-card">
                    <div class="result-way-title">WAY ${way.num}</div>
                    <div class="result-way-label">${way.label}</div>
                    ${top ? `
                      <div class="result-top-answer">
                        <p class="answer-body" style="font-size:13px">${esc(top.text)}</p>
                        <p class="result-top-author">— ${esc(top.author)} · ${esc(top.team)} ❤️ ${top.likes||0}</p>
                      </div>` :
                      `<p class="result-empty">아직 답변이 없습니다</p>`}
                  </div>`;
              }).join("")}
            </div>
          </div>`;
      }

      content.innerHTML = html;
    };

    document.getElementById("present-modal-close").addEventListener("click", () =>
      document.getElementById("present-modal").classList.add("hidden"));

    function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  </script>
</body>
</html>
